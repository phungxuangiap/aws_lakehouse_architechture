name: Deploy Data Pipeline

on:
  # Cho phép kích hoạt thủ công từ giao diện GitHub Actions
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'           # Thay đổi code logic (Ingestion/ETL)
      - 'infra/app/**'    # Thay đổi cấu hình Lambda/Trigger
      - 'Dockerfile'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'infra/app/**'
      - 'Dockerfile'
jobs:
  # JOB 1: Đóng gói và đẩy Code lên ECR
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Tạo Tag ngắn từ Git Commit SHA (ví dụ: a1b2c3d)
      - name: Set Image Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Đăng nhập vào AWS (Sử dụng Secrets bạn đã cài ở GitHub)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2 # Thay bằng region của bạn

      # Lấy quyền Login Docker vào ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Build và Push Image với tên đầy đủ (URL ECR + Repo Name + Tag)
      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }} # Khai báo trong GitHub Secrets
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # JOB 2: Cập nhật cấu hình Lambda thông qua Terraform
  deploy-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      - name: Upload Glue Script to S3
        run: |
          aws s3 cp src/pipelines/transform_to_bronze.py s3://alex-lakehouse-storage-2026/scripts/transform_to_bronze.py
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init & Apply
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd infra/app
          terraform init
          terraform apply -auto-approve -var="image_tag=$IMAGE_TAG"
      