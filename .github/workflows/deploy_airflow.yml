name: CD_AIRFLOW

on:
    push: 
        branches: [ main ]
        paths: 
            - 'src/pipelines/**'
            - 'infra/core/**'
            - 'Dockerfile'
    workflow_dispatch: 

jobs: 
    check_changes:
      runs-on: ubuntu-latest
      outputs:
        run_build: ${{ steps.filter.outputs.system }}
      steps:
        - uses: actions/checkout@v3
        - uses: dorny/paths-filter@v2
          id: filter
          with:
            filters: |
              system:
                - 'Dockerfile'
                - 'src/pipelines/requirements.txt'
                - 'src/pipelines/docker-compose.yaml'
                - 'infra/core/**'

    build-and-push:
      runs-on: ubuntu-latest
      needs: [check_changes]
      if: needs.check_changes.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
      steps:
        - name: Checkout Code
          uses: actions/checkout@v3

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-southeast-2 

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Build, Tag, and Push Image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          run: |
            cd src/pipelines
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    deploy_to_ec2:
      name: Deploy to EC2
      runs-on: ubuntu-latest
      needs: [check_changes, build-and-push]
      if: |
        always() && 
        needs.check_changes.result == 'success' && 
        (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
      steps: 
        - name: Checkout Code 
          uses: actions/checkout@v3

        - name: Pre-deploy Fix Permissions
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.REMOTE_HOST }}
            username: "ubuntu"
            key: ${{ secrets.SERVER_SSH_KEY }}
            script: |
              # Đảm bảo thư mục gốc tồn tại và user ubuntu có quyền sở hữu để rsync không lỗi
              sudo mkdir -p /home/ubuntu/airflow
              sudo chown -R ubuntu:ubuntu /home/ubuntu/airflow

        - name: Deploy to server via SSH
          uses: easingthemes/ssh-deploy@main
          with:
            SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
            REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
            REMOTE_USER: "ubuntu"
            SOURCE: "src/pipelines/" 
            TARGET: "/home/ubuntu/airflow/"
            ARGS: "-rlz --delete --mkpath"
            EXCLUDE: "/logs/, /__pycache__/, /.env, /plugins/, /config/"
            SCRIPT_AFTER: |
                set -e
                cd /home/ubuntu/airflow
                
                # 1. Xác thực ECR (Dùng quyền từ IAM Role của EC2 - Không cần export Key)
                aws ecr get-login-password --region ap-southeast-2 | sudo docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
                
                # 2. Cấu hình .env
                # Lưu ý: FULL_IMAGE_NAME giúp docker-compose biết image nào cần pull
                cat <<EOT | sudo tee .env
                AIRFLOW_UID=50000
                AIRFLOW_GID=0
                FULL_IMAGE_NAME=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com/${{ secrets.ECR_REPOSITORY_NAME }}:latest
                AWS_DEFAULT_REGION=ap-southeast-2
                EOT

                # 3. Quản lý quyền hạn cho các folder Airflow (UID 50000 của Airflow user)
                sudo mkdir -p logs dags plugins config scripts
                sudo chown -R 50000:0 logs dags plugins config scripts
                sudo chmod -R 775 logs dags plugins config scripts
                
                # 4. Triển khai Docker Compose
                # --force-recreate để chắc chắn container nhận biến môi trường mới nếu có thay đổi
                if [ "${{ needs.check_changes.outputs.run_build }}" == "true" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
                  sudo docker compose pull
                  sudo docker compose up -d --remove-orphans --force-recreate
                else
                  sudo docker compose up -d --force-recreate
                fi
                
                # 5. Dọn dẹp các Image cũ để tránh tràn ổ cứng
                sudo docker image prune -f