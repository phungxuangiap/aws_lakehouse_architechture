name: CD_AIRFLOW

on:
    push: 
        branches: 
            - main
        paths: 
            - 'src/pipelines/**'
            - 'infra/core/**'
            - 'Dockerfile'
    pull_request:
        branches: 
            - main
        paths: 
            - 'src/pipelines/**'
            - 'infra/core/**'
            - 'Dockerfile'
    workflow_dispatch: 
jobs: 
    # build-airflow:
    #   runs-on: ubuntu-latest
    #   steps:
    #     - uses: actions/checkout@v3
        
    #     - name: Build Airflow Image
    #       run: |
    #         cd src/pipelines
    #         docker build -t apache-airflow-amazon:aws-dorian .
        
    #     - name: Push to ECR
    #       run: |
    #         aws ecr get-login-password --region ap-southeast-2 | \
    #         docker login --username AWS --password-stdin $ECR_URI
            
    #         docker tag apache-airflow-amazon:aws-dorian \
    #           $ECR_URI/apache-airflow-amazon:aws-dorian
    #         docker push $ECR_URI/apache-airflow-amazon:aws-dorian
    build-and-push:
      runs-on: ubuntu-latest
      outputs:
        image_tag: ${{ steps.vars.outputs.sha_short }}
      steps:
        - name: Checkout Code
          uses: actions/checkout@v3

        - name: Set Image Tag
          id: vars
          run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            # Lưu ý: Sửa lỗi typo AWS_ACCEdeplSS thành AWS_ACCESS_KEY_ID
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-southeast-2 

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Build, Tag, and Push Image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
            IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          run: |
            cd src/pipelines
            
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
            
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
    deploy_to_ec2:
      name: deploy_to_EC2
      runs-on: ubuntu-latest
      needs: build-and-push # Đảm bảo image đã lên ECR mới chạy bước này
      steps: 
      # Lấy quyền Login Docker vào ECR
          - name: Login to Amazon ECR
            id: login-ecr
            uses: aws-actions/amazon-ecr-login@v1
          - name: Deploy to server via SSH
            uses: easingthemes/ssh-deploy@main
            with:
              REMOTE_USER: "ubuntu"
              SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
              REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
              SOURCE: "docker-compose.yaml" 
              TARGET: "/home/ubuntu/airflow"
              SCRIPT_AFTER: |
                  cd /home/ubuntu/airflow
                  
                  export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
                  export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  export AWS_DEFAULT_REGION=ap-southeast-2
                  
                  aws ecr get-login-password --region $AWS_DEFAULT_REGION | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
                  
                  echo "AIRFLOW_UID=$(id -u)" > .env
                  echo "AIRFLOW_GID=0" >> .env
                  
                  sudo docker compose pull
                  sudo docker compose up -d
                  sudo sleep 30 
                  sudo docker exec airflow-webserver airflow users create \
                        --username admin \
                        --firstname Giap \
                        --lastname Phung \
                        --role Admin \
                        --email your-email@example.com \
                        --password admin


