name: CD_AIRFLOW

on:
    push: 
        branches: [ main ]
        paths: 
            - 'src/pipelines/**'
            - 'infra/core/**'
            - 'Dockerfile'
    workflow_dispatch: 

jobs: 
    check_changes:
      runs-on: ubuntu-latest
      outputs:
        run_build: ${{ steps.filter.outputs.system }}
      steps:
        - uses: actions/checkout@v3
        - uses: dorny/paths-filter@v2
          id: filter
          with:
            filters: |
              system:
                - 'Dockerfile'
                - 'src/pipelines/requirements.txt'
                - 'src/pipelines/docker-compose.yaml'
                - 'infra/core/**'

    build-and-push:
      runs-on: ubuntu-latest
      needs: [check_changes]
      if: needs.check_changes.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
      steps:
        - name: Checkout Code
          uses: actions/checkout@v3

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-southeast-2 

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Build, Tag, and Push Image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          run: |
            cd src/pipelines
            # Dùng github.sha làm tag để đảm bảo tính duy nhất
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
            
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    deploy_to_ec2:
      name: deploy_to_EC2
      runs-on: ubuntu-latest
      needs: [check_changes, build-and-push]
      if: |
        always() && 
        needs.check_changes.result == 'success' && 
        (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
      steps: 
          - name: Checkout Code 
            uses: actions/checkout@v3

          - name: Deploy to server via SSH
            uses: easingthemes/ssh-deploy@main
            with:
              SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
              REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
              REMOTE_USER: "ubuntu"
              SOURCE: "src/pipelines/" 
              TARGET: "/home/ubuntu/airflow/"
              ARGS: "-avz --delete --mkpath"
              SCRIPT_AFTER: |
                  cd /home/ubuntu/airflow
                  
                  # 1. Cấu hình xác thực AWS
                  export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
                  export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  export AWS_DEFAULT_REGION=ap-southeast-2
                  
                  aws ecr get-login-password --region $AWS_DEFAULT_REGION | sudo docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
                  
                  # 2. FIX QUAN TRỌNG: Cấu hình UID Airflow chuẩn (50000)
                  # Thay vì id -u (thường là 1000), ta ép 50000 để khớp quyền ghi logs
                  echo "AIRFLOW_UID=50000" > .env
                  echo "AIRFLOW_GID=0" >> .env
                  echo "FULL_IMAGE_NAME=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com/${{ secrets.ECR_REPOSITORY_NAME }}:latest" >> .env

                  # 3. FIX QUYỀN HẠN THƯ MỤC TRÊN HOST
                  # Tạo sẵn các thư mục mount nếu chưa có và gán cho user 50000
                  sudo mkdir -p logs dags plugins config scripts
                  sudo chown -R 50000:0 logs dags plugins config scripts
                  sudo chmod -R 775 logs dags plugins config scripts
                  
                  # 4. Pull image mới nếu có thay đổi hệ thống
                  if [ "${{ needs.check_changes.outputs.run_build }}" == "true" ]; then
                    echo "System change detected. Refreshing containers..."
                    sudo -E docker compose down --remove-orphans
                    sudo -E docker compose pull
                  fi
                  
                  # 5. Khởi động hệ thống
                  sudo -E docker compose up -d
                  
                  # Đợi hệ thống ổn định và kiểm tra log nhanh
                  sleep 20
                  sudo docker ps
                  
                  # 6. Khởi tạo User Admin (Nếu chưa có)
                  sudo -E docker exec airflow-airflow-webserver-1 airflow users create \
                        --username admin \
                        --firstname Giap \
                        --lastname Phung \
                        --role Admin \
                        --email giap.phung@student.ptithcm.edu.vn \
                        --password admin || echo "Admin user exists."