name: CD_AIRFLOW

on:
    push: 
        branches: 
            - main
        paths: 
            - 'src/pipelines/**'
            - 'infra/core/**'
            - 'Dockerfile'
    pull_request:
        branches: 
            - main
        paths: 
            - 'src/pipelines/**'
            - 'infra/core/**'
            - 'Dockerfile'
    workflow_dispatch: 
jobs: 
    # build-airflow:
    #   runs-on: ubuntu-latest
    #   steps:
    #     - uses: actions/checkout@v3
        
    #     - name: Build Airflow Image
    #       run: |
    #         cd src/pipelines
    #         docker build -t apache-airflow-amazon:aws-dorian .
        
    #     - name: Push to ECR
    #       run: |
    #         aws ecr get-login-password --region ap-southeast-2 | \
    #         docker login --username AWS --password-stdin $ECR_URI
            
    #         docker tag apache-airflow-amazon:aws-dorian \
    #           $ECR_URI/apache-airflow-amazon:aws-dorian
    #         docker push $ECR_URI/apache-airflow-amazon:aws-dorian
    build-and-push:
      runs-on: ubuntu-latest
      outputs:
        image_tag: ${{ steps.vars.outputs.sha_short }}
      steps:
        - name: Checkout Code
          uses: actions/checkout@v3

        - name: Set Image Tag
          id: vars
          run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            # Lưu ý: Sửa lỗi typo AWS_ACCEdeplSS thành AWS_ACCESS_KEY_ID
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-southeast-2 

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1

        - name: Build, Tag, and Push Image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
            IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
          run: |
            cd src/pipelines
            
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            
            docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
            
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
    deploy_to_ec2:
      name: deploy_to_EC2
      runs-on: ubuntu-latest
      needs: build-and-push
      steps: 
          - name: Checkout Code 
            uses: actions/checkout@v3

          - name: Deploy to server via SSH
            uses: easingthemes/ssh-deploy@main
            with:
              SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
              REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
              REMOTE_USER: "ubuntu"
              SOURCE: "src/pipelines/docker-compose.yaml" 
              # Sử dụng thư mục cha, không chỉ định tên file trực tiếp ở TARGET để rsync không bị nhầm lẫn
              TARGET: "/home/ubuntu/airflow/"
              # Thêm --mkpath để rsync tự tạo folder nếu trên server chưa có
              ARGS: "-avz --mkpath"
              SCRIPT_AFTER: |
                  # 1. Đảm bảo di chuyển vào đúng thư mục
                  cd /home/ubuntu/airflow
                  
                  # 2. Xử lý trường hợp rsync copy kèm theo cấu trúc thư mục src/pipelines/
                  if [ -d "src/pipelines" ]; then
                    echo "Moving docker-compose from subfolder to root..."
                    mv src/pipelines/docker-compose.yaml .
                    rm -rf src
                  fi
                  
                  # 3. Thiết lập biến môi trường AWS để login ECR ngay trên EC2
                  export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
                  export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  export AWS_DEFAULT_REGION=ap-southeast-2
                  
                  # 4. Login Docker vào ECR
                  aws ecr get-login-password --region $AWS_DEFAULT_REGION | sudo docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
                  
                  # 5. Cấu hình User ID cho Airflow (Tránh lỗi Permission trên Linux)
                  echo "AIRFLOW_UID=$(id -u)" > .env
                  echo "AIRFLOW_GID=0" >> .env
                  
                  # 6. Pull image mới nhất và khởi động
                  sudo docker compose pull
                  sudo docker compose up -d
                  
                  # 7. Đợi một chút để DB sẵn sàng rồi tạo User (Nếu chưa có)
                  echo "Waiting for services to start..."
                  sleep 30
                  sudo docker exec airflow-webserver airflow users create \
                        --username admin \
                        --firstname Giap \
                        --lastname Phung \
                        --role Admin \
                        --email admin@example.com \
                        --password admin || echo "User already exists or failed to create."