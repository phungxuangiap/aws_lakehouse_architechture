name: Terraform Core Infra

on:
  # Cho phép kích hoạt thủ công từ giao diện GitHub Actions
  workflow_dispatch:
  
  # Tự động chạy khi có thay đổi trong thư mục core trên nhánh main
  push:
    branches: [ main ]
    paths:
      - 'infra/core/**'

jobs:
  terraform-core:
    name: "Provision Core Infrastructure"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Xác thực quyền với AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Thay bằng region của bạn

      # Cài đặt công cụ Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # Chạy các lệnh Terraform tại thư mục infra/core
      - name: Terraform Init
        run: |
          cd infra/core
          terraform init

      # Bước kiểm tra (Plan) - Giúp bạn xem trước những gì sẽ thay đổi
      - name: Terraform Plan
        run: |
          cd infra/core
          terraform plan

      # Thực thi tạo hạ tầng
      - name: Terraform Apply
        run: |
          cd infra/core
          terraform apply -auto-approve